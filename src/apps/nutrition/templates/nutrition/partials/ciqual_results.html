{% if results %}
  <ul style="list-style:none;padding:0;margin:0;border:1px solid var(--color-secondary);border-radius:8px;overflow:hidden">
    {% for food in results %}
      <li style="padding:0.5rem 1rem;border-bottom:1px solid var(--color-secondary);cursor:pointer"
          hx-post="{% url 'nutrition:associate' %}"
          hx-vals='{"ingredient_id": "{{ ingredient_id }}", "ciqual_id": "{{ food.pk }}"}'
          hx-target="#ing-row-{{ ingredient_id }}"
          hx-swap="outerHTML"
          hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
        {{ food.name }}
      </li>
    {% endfor %}
  </ul>
{% elif request.GET.q %}
  <p style="color:var(--color-muted);font-size:0.85rem">Aucun résultat pour « {{ request.GET.q }} »</p>
{% endif %}
