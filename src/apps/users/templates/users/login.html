{% extends 'base.html' %}

{% block title %}Connexion — Ours Grognon{% endblock %}

{% block extra_css %}
<style>
  body { background: var(--color-bg-warm); }
  .login-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .login-card {
    background: var(--color-card);
    border-radius: var(--radius-lg);
    padding: 2.5rem;
    box-shadow: var(--shadow-md);
    border: 1px solid var(--color-border);
    width: 100%;
    max-width: 420px;
  }
  .login-title {
    font-family: var(--font-title);
    font-size: 1.75rem;
    color: var(--color-primary);
    margin-bottom: 0.25rem;
  }
  .login-subtitle {
    color: var(--color-text-light);
    font-size: 0.9rem;
    margin-bottom: 2rem;
  }
</style>
{% endblock %}

{% block content %}
<div class="login-wrap">
  <div class="login-card">

    <h1 class="login-title">Bonjour !</h1>
    <p class="login-subtitle">Connectez-vous pour accéder aux recettes.</p>

    <!-- Erreurs de connexion -->
    {% if form.errors %}
      <div class="alert alert-danger" style="margin-bottom:1.25rem;">
        <i class="fa-solid fa-triangle-exclamation"></i>
        Email ou mot de passe incorrect.
      </div>
    {% endif %}

    <form method="post" novalidate>
      {% csrf_token %}

      <div class="form-group" style="margin-bottom:1rem;">
        <label class="form-label" for="id_username">
          Adresse email <span class="required">*</span>
        </label>
        <input type="email"
               name="username"
               id="id_username"
               class="form-control"
               placeholder="votre@email.fr"
               autofocus
               required>
      </div>

      <div class="form-group" style="margin-bottom:1.75rem;">
        <label class="form-label" for="id_password">
          Mot de passe <span class="required">*</span>
        </label>
        <input type="password"
               name="password"
               id="id_password"
               class="form-control"
               placeholder="••••••••"
               required>
      </div>

      <button type="submit" class="btn btn-primary btn-lg btn-block">
        <i class="fa-solid fa-right-to-bracket"></i>
        Se connecter
      </button>
    </form>

  </div>
</div>
{% endblock %}
